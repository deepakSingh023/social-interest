spring.application.name=social_interest

# MongoDB

spring.data.mongodb.uri=${MONGO_URI}

# Internal Service Secret

secret.service=${SERVICE_SECRET}

# Health

health.uri=http://interest-service:8088/api/health

# Server

server.port=8088

# Logging

logging.level.org.springframework.web=INFO
logging.level.root=INFO
logging.level.com.example.social_interest=INFO
logging.level.org.springframework=INFO

# Actuator

management.endpoint.health.show-details=always
management.datadog.metrics.export.enabled=true
management.defaults.metrics.export.enabled=true

management.metrics.use-global-registry=true
management.endpoint.metrics.enabled=true

management.endpoint.web.base-path=/actuator
management.endpoints.web.exposure.include=*
